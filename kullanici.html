<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kullanıcı Paneli - QR Araç</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="config.js"></script>
    <script src="toast.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans flex flex-col md:flex-row min-h-screen">

    <div id="toast-container" class="fixed top-5 right-5 z-[9999] flex flex-col gap-3 pointer-events-none"></div>

    <aside class="w-full md:w-64 bg-gray-800 border-b md:border-b-0 md:border-r border-gray-700 flex flex-row md:flex-col justify-between md:justify-start p-4 md:p-6 items-center md:items-stretch shrink-0">
        <div class="text-xl md:text-2xl font-extrabold tracking-wider text-white md:mb-10">
            <span class="text-blue-500">QR</span>Araç
        </div>
        <nav class="flex flex-row md:flex-col gap-2 md:gap-4 items-center md:items-stretch">
            <a href="#" class="bg-blue-600/20 text-blue-500 font-bold px-3 py-2 md:px-4 md:py-3 rounded-lg border border-blue-500/50 text-sm md:text-base text-center">Cihazlarım</a>
            <a href="index.html" class="text-red-400 hover:text-red-300 px-3 py-2 md:px-4 md:py-3 rounded-lg transition mt-0 md:mt-auto text-sm md:text-base text-center">Çıkış Yap</a>
        </nav>
    </aside>

    <main class="flex-1 p-4 md:p-8">
        <div class="max-w-4xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">
            
            <div class="bg-gray-800 p-5 md:p-6 rounded-xl border border-gray-700 shadow-xl">
                <h2 class="text-xl font-bold mb-4 text-white">Yeni QR Kod Ekle</h2>
                <form id="birlesikForm" class="flex flex-col gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">QR Kod ID</label>
                        <div class="relative flex items-center">
                            <input type="text" id="qrIdInput" class="w-full bg-gray-900 border border-gray-700 rounded-lg pl-4 pr-12 py-2 text-white focus:outline-none focus:border-blue-500" placeholder="QR kod okutun veya yazın" required>
                            <button type="button" onclick="kameraAc()" class="absolute right-2 p-2 bg-gray-800 hover:bg-gray-700 rounded-lg text-blue-400 transition" title="Kamera ile Okut">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Ad Soyad</label>
                        <input type="text" id="surucuIsim" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white" required>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Telefon</label>
                        <input type="tel" id="surucuTel" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white" required>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Araç Plaka</label>
                        <input type="text" id="aracPlaka" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white" required>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Acil Not</label>
                        <textarea id="acilNot" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white" rows="2"></textarea>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="checkbox" id="numaraGizle" class="w-5 h-5">
                        <label for="numaraGizle" class="text-sm text-gray-300">Telefon numaramı gizle</label>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-lg font-bold">Kaydet ve Aktifleştir</button>
                </form>
            </div>

            <div class="bg-gray-800 p-5 md:p-6 rounded-xl border border-gray-700 shadow-xl h-fit overflow-x-auto">
                <h2 class="text-xl font-bold mb-4 text-white">Aktif QR Kodlarım</h2>
                <div id="aktifQrListesi" class="flex flex-col gap-3 min-w-[300px]">
                    <p class="text-gray-500 italic">Yükleniyor...</p>
                </div>
            </div>
        </div>
    </main>

    <div id="kameraModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-sm z-[1100] flex items-center justify-center p-4">
        <div class="bg-white p-4 md:p-6 rounded-xl w-full max-w-md relative">
            <button onclick="kameraKapat()" class="absolute top-4 right-4 text-gray-500 hover:text-black font-bold text-2xl z-10">&times;</button>
            <h2 class="text-xl font-bold text-black mb-4 text-center">Kodu Okutun</h2>
            <div id="qr-reader" class="w-full min-h-[300px] rounded-lg overflow-hidden border-2 border-dashed border-blue-500 flex items-center justify-center bg-gray-100">
                <span id="kameraYukleniyorText" class="text-gray-500 font-semibold">Kamera başlatılıyor...</span>
            </div>
            <p class="text-gray-500 text-sm text-center mt-4 font-semibold">Kameranızı QR koda doğru tutun.</p>
        </div>
    </div>
    
    <div id="editModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[1000] flex items-center justify-center p-4">
        <div class="bg-gray-800 p-6 md:p-8 rounded-xl w-full max-w-md border border-gray-700 shadow-2xl relative max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-bold text-white mb-6">Bilgileri Düzenle</h2>
            <form onsubmit="kaydetDuzenleme(event)" class="flex flex-col gap-4">
                <input type="hidden" id="edit_qrId">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Sürücü İsim</label>
                    <input type="text" id="edit_surucuIsim" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Telefon</label>
                    <input type="text" id="edit_surucuTel" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Araç Plaka</label>
                    <input type="text" id="edit_aracPlaka" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white" required>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Acil Not</label>
                    <textarea id="edit_acilNot" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white" rows="2"></textarea>
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="edit_numaraGizle" class="w-5 h-5">
                    <label for="edit_numaraGizle" class="text-sm text-gray-300">Telefon numaramı gizle</label>
                </div>
                <div class="flex gap-2 mt-4">
                    <button type="button" onclick="document.getElementById('editModal').classList.add('hidden')" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white py-2 rounded-lg font-bold">İptal</button>
                    <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-lg font-bold">Kaydet</button>
                </div>
            </form>
        </div>
    </div>

    <script src="kullanici.js"></script>
</body>
</html>
